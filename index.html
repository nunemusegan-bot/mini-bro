<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мини Бро: Полёт</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            touch-action: manipulation;
            user-select: none;
        }
        canvas { background: #16213e; border: 2px solid #e94560; border-radius: 10px; display: none; max-width: 100%; }
        #startScreen, #endScreen {
            text-align: center; background: #0f3460; color: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 0 30px rgba(233,69,96,0.5); max-width: 350px;
        }
        #endScreen { display: none; }
        button {
            background: #e94560; color: white; border: none; padding: 15px 40px;
            font-size: 20px; border-radius: 50px; cursor: pointer; margin-top: 20px; width: 100%;
        }
        button:active { transform: scale(0.95); }
        .icon { font-size: 50px; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        p { font-size: 18px; color: #ddd; margin: 8px 0; }
        h2 { color: #e94560; margin-bottom: 15px; }
        .small { font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div id="startScreen">
    <div class="icon">🚀</div>
    <h2>Мини Бро: Космический полёт</h2>
    <p>Лети к звёздам ⭐<br>Уклоняйся от астероидов ☄️</p>
    <p class="small">Нажимай на экран (или пробел)<br>Собери 20 звёзд, чтобы победить! 😉</p>
    <button id="startBtn">▶ Старт</button>
</div>

<div id="endScreen">
    <div class="icon">🏆</div>
    <h2 id="endTitle">Ты покорила космос!</h2>
    <p id="endMsg"></p>
    <p>🌟 Ты самая классная подруга</p>
    <p>✨ С тобой всегда весело и легко</p>
    <p>🤗 Ты делаешь мою жизнь лучше</p>
    <p>💖 Спасибо, что ты есть!</p>
    <button id="restartBtn">🔄 Ещё раз</button>
</div>

<canvas id="gameCanvas" width="360" height="600"></canvas>

<script>
(function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    
    const startScreen = document.getElementById('startScreen');
    const endScreen = document.getElementById('endScreen');
    const endTitle = document.getElementById('endTitle');
    const endMsg = document.getElementById('endMsg');

    let rocket, stars = [], asteroids = [], score, gameRunning, winScore = 20;
    let gameEnded = false;
    let frame = 0;

    class Rocket {
        constructor() {
            this.x = 80;
            this.y = H / 2;
            this.vy = 0;
            this.size = 30;
        }
        flap() {
            if (gameRunning) this.vy = -6;
        }
        update() {
            this.y += this.vy;
            this.vy += 0.4;
            if (this.y < 0) this.y = 0;
            if (this.y + this.size > H) this.y = H - this.size;
        }
        draw() {
            ctx.font = `${this.size}px Arial`;
            ctx.fillText('🚀', this.x - this.size/2, this.y + this.size/2);
        }
    }

    class Star {
        constructor() {
            this.x = W;
            this.y = Math.random() * (H - 100) + 50;
            this.speed = 3;
            this.size = 25;
            this.passed = false;
        }
        update() { this.x -= this.speed; }
        draw() { ctx.font = `${this.size}px Arial`; ctx.fillText('⭐', this.x, this.y); }
    }

    class Asteroid {
        constructor() {
            this.x = W;
            this.y = Math.random() * (H - 100) + 50;
            this.speed = 3;
            this.size = 30;
        }
        update() { this.x -= this.speed; }
        draw() { ctx.font = `${this.size}px Arial`; ctx.fillText('☄️', this.x, this.y); }
    }

    function startGame() {
        startScreen.style.display = 'none';
        endScreen.style.display = 'none';
        canvas.style.display = 'block';
        rocket = new Rocket();
        stars = []; asteroids = []; score = 0;
        gameRunning = true; gameEnded = false; frame = 0;
    }

    function endGame(won) {
        if (gameEnded) return;
        gameEnded = true; gameRunning = false;
        canvas.style.display = 'none';
        endScreen.style.display = 'block';
        if (won) {
            endTitle.innerText = 'Ты покорила космос!';
            endMsg.innerText = `Ты собрала ${score} звёзд! 🚀`;
        } else {
            endTitle.innerText = 'Крушение!';
            endMsg.innerText = `Ты набрала ${score} звёзд. Попробуй ещё раз!`;
        }
    }

    function gameLoop() {
        if (!gameRunning) return;
        frame++;
        ctx.clearRect(0, 0, W, H);

        // Звёздный фон
        ctx.fillStyle = 'white';
        for(let i=0; i<20; i++) {
            let x = (frame * (i%3+1) + i*20) % W;
            let y = (i*25 + frame) % H;
            ctx.fillRect(x, y, 2, 2);
        }

        rocket.update();
        rocket.draw();

        // Спавн объектов
        if (frame % 50 === 0) {
            if (Math.random() < 0.7) stars.push(new Star());
            else asteroids.push(new Asteroid());
        }

        // Звёзды
        for (let i = stars.length-1; i >= 0; i--) {
            stars[i].update(); stars[i].draw();
            if (stars[i].x < -30) { stars.splice(i,1); continue; }
            // Столкновение
            if (Math.abs(stars[i].x - rocket.x) < 25 && Math.abs(stars[i].y - rocket.y) < 25) {
                stars.splice(i,1);
                score++;
            }
        }

        // Астероиды
        for (let i = asteroids.length-1; i >= 0; i--) {
            asteroids[i].update(); asteroids[i].draw();
            if (asteroids[i].x < -30) { asteroids.splice(i,1); continue; }
            // Столкновение
            if (Math.abs(asteroids[i].x - rocket.x) < 25 && Math.abs(asteroids[i].y - rocket.y) < 25) {
                endGame(false); return;
            }
        }

        // Очки
        ctx.fillStyle = '#e94560'; ctx.font = 'bold 22px Arial';
        ctx.fillText(`⭐ ${score}/${winScore}`, 15, 35);

        if (score >= winScore) { endGame(true); return; }
        requestAnimationFrame(gameLoop);
    }

    // Управление
    canvas.addEventListener('touchstart', e => { e.preventDefault(); if (rocket) rocket.flap(); });
    canvas.addEventListener('mousedown', e => { e.preventDefault(); if (rocket) rocket.flap(); });
    document.addEventListener('keydown', e => {
        if (e.code === 'Space' && rocket) { e.preventDefault(); rocket.flap(); }
    });

    document.getElementById('startBtn').onclick = () => { startGame(); requestAnimationFrame(gameLoop); };
    document.getElementById('restartBtn').onclick = () => { startGame(); requestAnimationFrame(gameLoop); };
})();
</script>
</body>
</html>
