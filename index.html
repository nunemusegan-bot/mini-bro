<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мини Бро: Поймай ритм</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            touch-action: manipulation;
            user-select: none;
        }
        canvas { 
            background: #1a1a2e; 
            border: 2px solid #ff6b9d; 
            border-radius: 10px; 
            display: none; 
            max-width: 100%; 
        }
        #startScreen, #endScreen {
            text-align: center; 
            background: #16213e; 
            color: white; 
            padding: 30px; 
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255,107,157,0.4); 
            max-width: 350px;
        }
        #endScreen { display: none; }
        button {
            background: #ff6b9d;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        button:active { transform: scale(0.95); }
        .icon { font-size: 50px; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        p { font-size: 18px; color: #ddd; margin: 8px 0; }
        h2 { color: #ff6b9d; margin-bottom: 15px; }
        .small { font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div id="startScreen">
    <div class="icon">🎵</div>
    <h2>Мини Бро: Поймай ритм</h2>
    <p>Тапай по падающим звёздам ⭐<br>Не трогай бомбы 💣</p>
    <p class="small">Нажимай прямо на звёзды пальцем или мышкой<br>Собери 25 звёзд для победы! 😉</p>
    <button id="startBtn">▶ Играть</button>
</div>

<div id="endScreen">
    <div class="icon">🎉</div>
    <h2 id="endTitle">Вот это да!</h2>
    <p id="endMsg"></p>
    <p id="endLine1"></p>
    <p id="endLine2"></p>
    <p id="endLine3"></p>
    <p id="endLine4"></p>
    <button id="restartBtn">🔄 Ещё раз</button>
</div>

<canvas id="gameCanvas" width="360" height="600"></canvas>

<script>
(function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    
    const startScreen = document.getElementById('startScreen');
    const endScreen = document.getElementById('endScreen');
    const endTitle = document.getElementById('endTitle');
    const endMsg = document.getElementById('endMsg');
    const endLine1 = document.getElementById('endLine1');
    const endLine2 = document.getElementById('endLine2');
    const endLine3 = document.getElementById('endLine3');
    const endLine4 = document.getElementById('endLine4');

    let items = [], score, gameRunning, winScore = 25;
    let gameEnded = false;
    let particles = [];
    let frame = 0;
    let speed = 2;

    class FallingItem {
        constructor(type) {
            this.x = Math.random() * (W - 40) + 20;
            this.y = -30;
            this.speed = speed + Math.random() * 1.5;
            this.type = type; // 'star' или 'bomb'
            this.size = 30;
            this.clicked = false;
        }
        update() { 
            this.y += this.speed; 
            if (this.y > H + 50) this.clicked = true; // Ушло за экран
        }
        draw() { 
            ctx.font = `${this.size}px Arial`; 
            if (this.type === 'star') {
                ctx.fillText('⭐', this.x - this.size/2, this.y + this.size/2);
            } else {
                ctx.fillText('💣', this.x - this.size/2, this.y + this.size/2);
            }
        }
        isHit(tx, ty) {
            return Math.abs(tx - this.x) < this.size/1.5 && Math.abs(ty - this.y) < this.size/1.5;
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = (Math.random() - 0.5) * 6;
            this.life = 1;
            this.color = color;
        }
        update() { 
            this.x += this.vx; 
            this.y += this.vy; 
            this.life -= 0.03; 
        }
        draw() { 
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x - 2, this.y - 2, 4, 4);
            ctx.globalAlpha = 1;
        }
    }

    function startGame() {
        startScreen.style.display = 'none';
        endScreen.style.display = 'none';
        canvas.style.display = 'block';
        items = []; particles = []; score = 0;
        gameRunning = true; gameEnded = false;
        speed = 2; frame = 0;
    }

    function endGame(won) {
        if (gameEnded) return;
        gameEnded = true; gameRunning = false;
        canvas.style.display = 'none';
        endScreen.style.display = 'block';
        
        // НОВЫЕ ТЕКСТЫ
        if (won) {
            endTitle.innerText = 'Просто вау! 🤩';
            endMsg.innerText = `Ты поймала ${score} звёзд!`;
            endLine1.innerText = '🎯 У тебя реакция как у ниндзя';
            endLine2.innerText = '💫 Ты делаешь этот мир ярче';
            endLine3.innerText = '🤗 Спасибо за твою дружбу';
            endLine4.innerText = '💖 Ты невероятная!';
        } else {
            endTitle.innerText = 'Ой! 💥';
            endMsg.innerText = `Поймано ${score} звёзд, но бомба...`;
            endLine1.innerText = '🍀 Ничего страшного';
            endLine2.innerText = '💪 В следующий раз точно получится';
            endLine3.innerText = '✨ Я в тебя верю';
            endLine4.innerText = '🔄 Давай ещё попытку!';
        }
    }

    function addParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    function handleClick(tx, ty) {
        if (!gameRunning || gameEnded) return;
        
        for (let i = items.length - 1; i >= 0; i--) {
            if (!items[i].clicked && items[i].isHit(tx, ty)) {
                if (items[i].type === 'star') {
                    score++;
                    addParticles(items[i].x, items[i].y, '#ffcc00', 15);
                } else {
                    addParticles(items[i].x, items[i].y, '#ff4444', 20);
                    endGame(false);
                    return;
                }
                items[i].clicked = true;
                break;
            }
        }
    }

    function gameLoop() {
        if (!gameRunning) return;
        frame++;
        ctx.clearRect(0, 0, W, H);

        // Фон
        ctx.fillStyle = '#111133';
        for (let i = 0; i < 30; i++) {
            let y = (frame * (i % 4 + 1) + i * 30) % H;
            ctx.fillStyle = `rgba(255,255,255,${0.3 + (i % 3) * 0.2})`;
            ctx.fillRect(i * 13, y, 2, 2);
        }

        // Ускорение
        if (frame % 200 === 0) speed += 0.3;

        // Спавн
        if (Math.random() < 0.03) items.push(new FallingItem('star'));
        if (Math.random() < 0.01) items.push(new FallingItem('bomb'));

        // Обновление предметов
        for (let i = items.length - 1; i >= 0; i--) {
            items[i].update();
            items[i].draw();
            
            // Удаление ушедших за экран
            if (items[i].y > H + 60) {
                items.splice(i, 1);
            }
        }

        // Частицы
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }

        // Счёт
        ctx.fillStyle = '#ff6b9d';
        ctx.font = 'bold 24px Arial';
        ctx.fillText(`⭐ ${score}/${winScore}`, 15, 40);
        
        ctx.fillStyle = '#aaa';
        ctx.font = '11px Arial';
        ctx.fillText(`Темп: ${speed.toFixed(1)}`, 15, 58);

        // Победа
        if (score >= winScore && !gameEnded) {
            endGame(true);
            return;
        }

        requestAnimationFrame(gameLoop);
    }

    // Управление
    canvas.addEventListener('click', e => {
        let rect = canvas.getBoundingClientRect();
        handleClick(e.clientX - rect.left, e.clientY - rect.top);
    });
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        let rect = canvas.getBoundingClientRect();
        let touch = e.touches[0];
        handleClick(touch.clientX - rect.left, touch.clientY - rect.top);
    });

    document.getElementById('startBtn').onclick = () => { 
        startGame(); 
        requestAnimationFrame(gameLoop); 
    };
    document.getElementById('restartBtn').onclick = () => { 
        startGame(); 
        requestAnimationFrame(gameLoop); 
    };
})();
</script>
</body>
</html>
