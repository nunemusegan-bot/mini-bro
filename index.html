<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Поймай звёзды для Мини Бро</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e8e0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            touch-action: manipulation;
            user-select: none;
        }
        canvas { background: #fff; border: 3px solid #9c27b0; border-radius: 10px; display: none; max-width: 100%; }
        #startScreen, #endScreen {
            text-align: center; background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 0 30px rgba(156,39,176,0.3); max-width: 350px;
        }
        #endScreen { display: none; }
        button {
            background: #9c27b0; color: white; border: none; padding: 15px 40px;
            font-size: 20px; border-radius: 50px; cursor: pointer; margin-top: 20px; width: 100%;
        }
        .star-icon { font-size: 50px; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        p { font-size: 18px; color: #555; margin: 8px 0; }
        h2 { color: #9c27b0; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="startScreen">
    <div class="star-icon">🧺</div>
    <h2>Игра для Мини Бро</h2>
    <p>Лови звёздочки ⭐<br>Уворачивайся от тучек ☁️</p>
    <p style="font-size:14px; color:#888;">Двигай пальцем по экрану<br>Собери 30 звёзд — там сюрприз 😉</p>
    <button id="startBtn">▶ Играть</button>
</div>

<div id="endScreen">
    <div class="star-icon">⭐</div>
    <h2 id="endTitle">Мини Бро, ты супер!</h2>
    <p id="endMsg">Ты собрала все звёзды!</p>
    <p>🌸 Ты самая классная подруга</p>
    <p>✨ С тобой всегда душевно</p>
    <p>🤗 Ценю нашу дружбу</p>
    <p>💜 Спасибо, что ты есть!</p>
    <button id="restartBtn">🔄 Ещё разок</button>
</div>

<canvas id="gameCanvas" width="360" height="500"></canvas>

<script>
(function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    
    const startScreen = document.getElementById('startScreen');
    const endScreen = document.getElementById('endScreen');
    const endTitle = document.getElementById('endTitle');
    const endMsg = document.getElementById('endMsg');

    let basket, stars = [], clouds = [], score, gameRunning, winScore = 30;
    let gameEnded = false;

    class Basket {
        constructor() { this.w = 60; this.h = 40; this.x = W/2 - 30; this.y = H - 70; }
        draw() {
            ctx.font = '40px Arial';
            ctx.fillText('🧺', this.x, this.y + this.h);
        }
    }

    class Star {
        constructor() {
            this.x = Math.random() * (W - 20);
            this.y = -30;
            this.speed = 2 + Math.random() * 2;
        }
        update() { this.y += this.speed; }
        draw() { ctx.font = '24px Arial'; ctx.fillText('⭐', this.x, this.y); }
    }

    class Cloud {
        constructor() {
            this.x = Math.random() * (W - 20);
            this.y = -30;
            this.speed = 2 + Math.random() * 2;
        }
        update() { this.y += this.speed; }
        draw() { ctx.font = '24px Arial'; ctx.fillText('☁️', this.x, this.y); }
    }

    function startGame() {
        startScreen.style.display = 'none';
        endScreen.style.display = 'none';
        canvas.style.display = 'block';
        basket = new Basket();
        stars = []; clouds = []; score = 0;
        gameRunning = true; gameEnded = false;
    }

    function endGame(won) {
        if (gameEnded) return;
        gameEnded = true; gameRunning = false;
        canvas.style.display = 'none';
        endScreen.style.display = 'block';
        if (won) {
            endTitle.innerText = 'Мини Бро, ты супер!';
            endMsg.innerText = 'Ты собрала все звёзды! ⭐';
        } else {
            endTitle.innerText = 'Почти!';
            endMsg.innerText = 'Давай ещё разок 💪';
        }
    }

    function gameLoop() {
        if (!gameRunning) return;
        ctx.clearRect(0, 0, W, H);

        basket.draw();

        // Спавн
        if (Math.random() < 0.03) stars.push(new Star());
        if (Math.random() < 0.015) clouds.push(new Cloud());

        // Звёзды
        for (let i = stars.length-1; i >= 0; i--) {
            stars[i].update(); stars[i].draw();
            if (stars[i].y > H) { stars.splice(i,1); continue; }
            if (stars[i].x > basket.x && stars[i].x < basket.x+basket.w &&
                stars[i].y > basket.y && stars[i].y < basket.y+basket.h) {
                stars.splice(i,1); score++;
            }
        }

        // Тучки
        for (let i = clouds.length-1; i >= 0; i--) {
            clouds[i].update(); clouds[i].draw();
            if (clouds[i].y > H) { clouds.splice(i,1); continue; }
            if (clouds[i].x > basket.x && clouds[i].x < basket.x+basket.w &&
                clouds[i].y > basket.y && clouds[i].y < basket.y+basket.h) {
                endGame(false); return;
            }
        }

        ctx.fillStyle = '#9c27b0'; ctx.font = 'bold 22px Arial';
        ctx.fillText(`⭐ ${score}/${winScore}`, 15, 30);

        if (score >= winScore) { endGame(true); return; }
        requestAnimationFrame(gameLoop);
    }

    // Управление пальцем
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        let touch = e.touches[0];
        let rect = canvas.getBoundingClientRect();
        let x = touch.clientX - rect.left;
        if (basket && gameRunning) basket.x = Math.max(0, Math.min(W - basket.w, x - basket.w/2));
    });
    canvas.addEventListener('mousemove', e => {
        let rect = canvas.getBoundingClientRect();
        let x = e.clientX - rect.left;
        if (basket && gameRunning) basket.x = Math.max(0, Math.min(W - basket.w, x - basket.w/2));
    });

    document.getElementById('startBtn').onclick = () => { startGame(); requestAnimationFrame(gameLoop); };
    document.getElementById('restartBtn').onclick = () => { startGame(); requestAnimationFrame(gameLoop); };
})();
</script>
</body>
</html>
